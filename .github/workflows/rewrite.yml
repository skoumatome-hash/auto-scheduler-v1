name: Daily Rewrite Batch

on:
  # scheduleは無効化（GASから確実にトリガーする）
  # schedule:
  #   - cron: '0 15 * * *'
  workflow_dispatch:  # GASまたは手動でトリガー

jobs:
  rewrite:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install gspread google-auth anthropic httpx

      - name: Fetch insights (imp/follower data)
        env:
          ACCOUNTS_JSON: ${{ secrets.ACCOUNTS_JSON }}
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
        run: python fetch_insights.py

      - name: Run rewrite batch
        env:
          ACCOUNTS_JSON: ${{ secrets.ACCOUNTS_JSON }}
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python rewrite_batch.py
