name: Daily Rewrite Batch

on:
  # scheduleは無効化（GASから確実にトリガーする）
  # schedule:
  #   - cron: '0 15 * * *'
  workflow_dispatch:  # GASまたは手動でトリガー

permissions:
  contents: write

jobs:
  rewrite:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install gspread google-auth anthropic httpx

      - name: Fetch insights (imp/follower data)
        env:
          ACCOUNTS_JSON: ${{ secrets.ACCOUNTS_JSON }}
        run: python fetch_insights.py

      - name: Commit insights data
        run: |
          git config user.name "threads-bot"
          git config user.email "bot@threads.auto"
          git add data/ || true
          git diff --staged --quiet || git commit -m "[auto] daily insights $(date +%Y-%m-%d)"
          git push || true

      - name: Run rewrite batch
        env:
          ACCOUNTS_JSON: ${{ secrets.ACCOUNTS_JSON }}
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python rewrite_batch.py
